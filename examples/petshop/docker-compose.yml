# Classic petshop example for dist-api.
#
#   docker compose up
#
# Uses the project's deploy model: schema is migrated out-of-band by a
# one-shot `dist-api migrate`, the metadata is checked against the migrated
# database by `dist-api validate`, and only then does the engine serve. All
# three use the same prebuilt public image (ghcr.io/pantyukhov/dist-api,
# pushed by .github/workflows/release.yml on each release tag) — no local
# build. The engine itself never runs DDL.
#
# Then open http://localhost:8080/v1/graphql (see README.md for queries per
# role).

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop
    # Not exposed on the host: only the engine talks to it over the compose
    # network. Add a `ports:` mapping if you want to inspect it with psql.
    volumes:
      - petshop-db:/var/lib/postgresql/data
    healthcheck:
      # Check over TCP (-h 127.0.0.1), not the unix socket: on first init the
      # official image runs a socket-only temp server, so a socket pg_isready
      # reports healthy before the real TCP listener is up — and the one-shot
      # `migrate` does not retry. TCP stays refused until the server is ready.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d petshop"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: apply versioned V{n}__*.sql migrations, then exit.
  migrate:
    image: ghcr.io/pantyukhov/dist-api:${ENGINE_TAG:-latest}
    command: ["migrate", "--migrations-dir", "/migrations"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petshop
    volumes:
      - ./migrations:/migrations:ro
    restart: "no"

  # One-shot: fail the deploy if metadata is inconsistent with the migrated DB.
  validate:
    image: ghcr.io/pantyukhov/dist-api:${ENGINE_TAG:-latest}
    command: ["validate", "--metadata-dir", "/metadata"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petshop
    volumes:
      - ./metadata:/metadata:ro
    restart: "no"

  engine:
    # Prebuilt public image. Override the tag with ENGINE_TAG, e.g.
    #   ENGINE_TAG=v1.2.3 docker compose up
    image: ghcr.io/pantyukhov/dist-api:${ENGINE_TAG:-latest}
    depends_on:
      validate:
        condition: service_completed_successfully
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petshop
      DIST_API_METADATA_DIR: /metadata
      DIST_API_PORT: "8080"
      # Trusted requests (with this secret) act as admin and may impersonate
      # any role via the X-Hasura-Role header. Change it for anything real.
      HASURA_GRAPHQL_ADMIN_SECRET: petshop-secret
      # Requests with no/role-less auth fall back to the public catalog role.
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    volumes:
      - ./metadata:/metadata:ro
    ports:
      - "8080:8080"

volumes:
  petshop-db:
