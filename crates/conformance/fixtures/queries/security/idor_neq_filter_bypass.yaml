description: A negated filter (_neq) cannot invert the permission to reach other owners' rows
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
query:
  query: |
    query {
      account(where: {owner: {_neq: "1"}}) {
        id
        owner
      }
    }
response:
  data:
    account: []
