description: Inserting a child row under another owner's parent fails the relationship check
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
response:
  errors:
    - extensions:
        path: $.selectionSet.insert_memo_one.args.objects
        code: permission-error
      message: check constraint of an insert/update permission has failed
query:
  query: |
    mutation {
      insert_memo_one(object: {account_id: 3, body: "sneaky"}) {
        id
      }
    }
