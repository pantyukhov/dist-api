description: A caller cannot set the owner column on insert; it is not in the insert input type
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
response:
  errors:
    - extensions:
        path: $.selectionSet.insert_account_one
        code: validation-failed
      message: "field 'owner' not found in type: 'account_insert_input'"
query:
  query: |
    mutation {
      insert_account_one(object: {owner: "2", label: "forged", balance: 0}) {
        id
      }
    }
