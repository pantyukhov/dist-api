description: Updating another owner's row by primary key returns null (no row matched the permission)
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
query:
  query: |
    mutation {
      update_account_by_pk(pk_columns: {id: 3}, _set: {label: "hacked"}) {
        id
        label
      }
    }
response:
  data:
    update_account_by_pk: null
