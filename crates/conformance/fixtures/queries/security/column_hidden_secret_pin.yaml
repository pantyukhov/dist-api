description: A column excluded from the select permission is not selectable (column-level)
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
response:
  errors:
    - extensions:
        path: $.selectionSet.account.selectionSet.secret_pin
        code: validation-failed
      message: "field 'secret_pin' not found in type: 'account'"
query:
  query: |
    query {
      account {
        id
        secret_pin
      }
    }
