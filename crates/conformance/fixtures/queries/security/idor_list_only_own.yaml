description: A user listing accounts sees only their own rows, never another owner's
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
query:
  query: |
    query {
      account(order_by: {id: asc}) {
        id
        owner
        label
      }
    }
response:
  data:
    account:
      - id: 1
        owner: '1'
        label: Alice main
      - id: 2
        owner: '1'
        label: Alice savings
