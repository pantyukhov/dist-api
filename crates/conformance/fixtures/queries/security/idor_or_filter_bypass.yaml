description: An _or in the where clause cannot widen access beyond the permission filter
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
query:
  query: |
    query {
      account(
        where: {_or: [{owner: {_eq: "2"}}, {balance: {_gt: 0}}]}
        order_by: {id: asc}
      ) {
        id
        owner
      }
    }
response:
  data:
    account:
      - id: 1
        owner: '1'
      - id: 2
        owner: '1'
