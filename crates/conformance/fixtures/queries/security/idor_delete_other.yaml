description: Deleting another owner's row affects zero rows (row permission on delete)
url: /v1/graphql
status: 200
headers:
  X-Hasura-Role: user
  X-Hasura-User-Id: '1'
query:
  query: |
    mutation {
      delete_account(where: {id: {_eq: 3}}) {
        affected_rows
        returning {
          id
        }
      }
    }
response:
  data:
    delete_account:
      affected_rows: 0
      returning: []
