# Ported from tests-py, with the final `get_user_by_email_nested_transformed`
# step dropped (response (Kriti) transforms are out of scope — see
# tests/hasura/COVERAGE.md). The remaining steps need no output relationship:
# user_id/address/addresses are plain custom objects shaped from the webhook.
- description: Run get_user_by_email_nested query action with valid email, the response should be an object
  url: /v1/graphql
  status: 200
  query:
    query: |
      query ($email: String!){
        get_user_by_email_nested(email: $email){
            user_id {
              id
            }
        }
      }
    variables:
      email: clarke@gmail.com
  response:
    data:
      get_user_by_email_nested:
        user_id:
          id: 1

- description: Run get_user_by_email_nested query action with valid email, the response should be an object
  url: /v1/graphql
  status: 200
  query:
    query: |
      query ($email: String!){
        get_user_by_email_nested(email: $email){
            id
            address {
              city
              country
            }
        }
      }
    variables:
      email: clarke@gmail.com
  response:
    data:
      get_user_by_email_nested:
        id: 1
        address:
          city: New York
          country: USA

